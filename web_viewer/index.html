<!DOCTYPE html>
<html lang="gl">
<!-- 
  Meteonube Web Viewer
  Desarrollado por: Gonzalo Couselo e Marcos Gay
  Año: 2026
-->

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gonzalo Couselo e Marcos Gay">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Evita que o navegador garde index.html antigo -->
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">

    <!-- Etiquetas Open Graph para compartir bonito en WhatsApp, Telegram, etc -->
    <meta property="og:title" content="⛅ Meteonube">
    <meta property="og:description" content="Visor meteorolóxico WRF para Galicia resolución 1.2 km">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://app.meteonube.es/">
    <meta property="og:image" content="https://app.meteonube.es/preview.jpg">
    <meta name="theme-color" content="#1a1c23">

    <!-- Favicon usando el emoji del logo -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛅</text></svg>">

    <title>Meteonube</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css?v=20">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2>⛅ Meteonube</h2>
            </div>
            <!-- Stations (Hidden by default) -->
            <div class="control-group hidden" id="station-group">
                <label>Estación</label>
                <select id="station-selector"></select>
            </div>

            <!-- Overlays -->
            <div class="control-group" id="overlays-group">
                <div class="sidebar-flow">
                    <div class="btn-cluster" id="weather-layers"></div>
                    <div class="btn-cluster" id="vars-clouds"></div>
                    <div class="btn-cluster" id="vars-wind"></div>
                    <div class="btn-cluster" id="vars-other"></div>
                    <label class="btn-toggle btn-toggle--inverse"><input type="checkbox" id="toggle-provinces" checked><span>Bordes</span></label>
                </div>
            </div>


            <div class="status-panel" id="status-panel"></div>

            <!-- Pie de página de autoría (oculto en pantallas hasta 1024px vía CSS) -->
            <div class="sidebar-attribution">
                Desarrollado por Gonzalo Couselo e Marcos Gay / Meteonube
            </div>
        </div>

        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <div class="viewer">
            <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">☰</button>
            <!-- Controls -->
            <div class="timeline-controls timeline-controls--compact">
                <div class="control-group-inline" id="date-controls">
                    <button type="button" id="btn-sounding-cycle" class="time-nav-btn sounding-cycle-btn sounding-cycle-btn--blue" aria-label="Sondeos: puntos azuis. Pulsa para etiquetas en verde ou desactivar."
                        title="Sondeos">🪂</button>
                    <button id="prev-day-btn" class="time-nav-btn" aria-label="Día anterior">⏮</button>
                    <select id="date-selector" class="timeline-date"></select>
                    <button id="next-day-btn" class="time-nav-btn" aria-label="Día siguiente">⏭</button>
                </div>
                <div class="control-group-inline" id="time-controls">
                    <button id="prev-time-btn" class="time-nav-btn" aria-label="Hora anterior">⏮</button>
                    <select id="time-selector" class="timeline-time"></select>
                    <button id="next-time-btn" class="time-nav-btn" aria-label="Hora siguiente">⏭</button>
                </div>
                <div class="timeline-controls-trailing">
                    <button type="button" id="btn-opacity-toggle" class="time-nav-btn timeline-opacity-btn" aria-label="Mostrar/ocultar control de opacidade">🎚️</button>
                </div>
            </div>
            <div class="opacity-container opacity-container--below-timeline" id="opacity-container">
                <label class="opacity-label" for="opacity-slider">🎚️ Opacidade</label>
                <input type="range" id="opacity-slider" min="10" max="100" value="45">
            </div>

            <!-- Leaflet Map -->
            <div id="map" class="map-viewer">
                <div id="current-var-label" class="current-var-label hidden"></div>
                <div class="loader" id="loader"></div>
                <div class="scale-container hidden" id="scale-container">
                    <img id="img-scale" alt="Scale">
                    <div class="scale-bottom-row">
                        <div class="scale-wrf-bundle">
                            <div class="scale-meta-row">
                                <div id="last-updated" class="last-updated-scale" aria-live="polite"></div>
                                <div id="leaflet-scale-anchor" class="leaflet-scale-anchor"></div>
                            </div>
                            <div id="dynamic-scale" class="dynamic-scale hidden" role="button" tabindex="-1"
                                aria-expanded="true"
                                aria-label="Mostrar ou ocultar números da escala, datos actualizados e panel de variables (en móbil)"></div>
                        </div>
                    </div>
                </div>
                <!-- Map Tooltip (Generic for all variables) -->
                <div id="wind-tooltip" class="wind-tooltip hidden">
                    <div id="wt-station-name" class="wt-station-name hidden">Station Name</div>
                    <div class="wt-name" id="wt-var-name">Variable</div>
                    <div class="wt-val"><span id="wt-value">0</span> <span id="wt-units" class="wt-unit">--</span></div>
                    <div class="wt-dir" id="wt-dir-box">
                        <span id="wt-dir-arrow">↑</span>
                        <span id="wt-dir-deg">0</span>°
                    </div>
                </div>
            </div>




        </div>
    </div>

    <!-- Special Views Overlay (Sounding/Meteogram) - Moved to Root for Isolation -->
    <div id="overlay-container" class="overlay-container hidden">
        <button id="close-modal" class="modal-close-btn" aria-label="Pechar ventá">✖</button>
        <div class="modal-content">
            <img id="img-sounding" class="overlay-image zoomable hidden" alt="Sounding">
            <img id="img-meteogram" class="overlay-image zoomable hidden" alt="Meteogram">
        </div>
    </div>

    <script src="app.js?v=31"></script>
</body>

</html>
